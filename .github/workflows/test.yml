name: RN Compatibility Matrix Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rn-compatibility-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  SDK_PATH: ${{ github.workspace }}
  APPS_PATH: ${{ github.workspace }}/.tmp

jobs:
  android:
    name: Android (RN ${{ matrix.RN_VERSION }})
    runs-on: ubuntu-latest
    if: false
    strategy:
      fail-fast: false
      matrix:
        RN_VERSION: ['0.76-stable', '0.79-stable', '0.81-stable', 'latest']

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Define App Paths
        run: |
          SAFE_MINOR="$(echo "${{ matrix.RN_VERSION}}" | tr '.-' '_')"
          APP_NAME="test1"
          APP_DIR="${{ env.APPS_PATH }}/${APP_NAME}"

          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV

      - name: Create React Native App
        run: |
          mkdir -p "${{ env.APPS_PATH }}"
          rm -rf "${{ env.APP_DIR }}"
          cd "${{ env.APPS_PATH }}"
          pwd
          npx @react-native-community/cli@latest init "${{ env.APP_NAME }}" \
            --version "${{ matrix.RN_VERSION }}" \
            --skip-install

      - name: Install JS Dependencies
        working-directory: ${{ env.APP_DIR }}
        run: yarn install

      - name: create directory for metro assets in the test app
        working-directory: ${{ env.APP_DIR }}
        run: mkdir -p android/app/src/main/assets

      - name: add repos to and fix min sdk version in build.gradle
        working-directory: ${{ env.APP_DIR }}
        run: |
          sed -i '/signingConfigs {/,/^    }$/{
           /^    }$/a\
           \
               repositories {\
                 google()\
                 mavenCentral()\
                 maven { url '"'"'https://maven.fpregistry.io/releases'"'"' }\
                 maven { url '"'"'https://jitpack.io'"'"' }\
               }
           }' android/app/build.gradle
           sed -i 's/minSdkVersion = [0-9]*/minSdkVersion = 24/' android/build.gradle

      - name: Install NeuroID SDK
        working-directory: ${{ env.APP_DIR }}
        run: yarn add "file:${{ env.SDK_PATH }}"

      - name: Copy Smoke Test Files
        run: |
          cp "${{ github.workspace }}/tests/SmokeRunner.ts" "${{ env.APP_DIR }}/SmokeRunner.ts"
          cp "${{ github.workspace }}/tests/App.tsx" "${{ env.APP_DIR }}/App.tsx"

      - name: add metro bundle in the test app asset folder
        working-directory: ${{ env.APP_DIR }}
        run: |
          npx react-native bundle --platform android --dev true --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", MODE="0666", GROUP="kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger
          sudo chown $USER /dev/kvm

      - name: assemble artifacts
        working-directory: ${{ env.APP_DIR }}/android
        run: ./gradlew assembleDebug

      # Execute sample app
      - name: Integration Test Sample app
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb install -r ${{ env.APP_DIR }}/android/app/build/outputs/apk/debug/app-debug.apk
            adb logcat -c
            adb logcat "ReactNativeJS:V *:S" > ${{ env.APP_DIR }}/android/app.log 2>&1 &
            LOGCAT_PID=$!
            sleep 2
            adb shell am start -n com.test1/.MainActivity
            sleep 60
            kill $LOGCAT_PID || true
            echo "=== Log file size: $(wc -l < ${{ env.APP_DIR }}/android/app.log) lines ==="
            adb emu kill

      - name: Verify Smoke Test Results
        working-directory: ${{ env.APP_DIR }}/android
        run: |
          for i in {1..30}; do
            if grep -q "NID_RN_SDK_PASS" app.log; then
              echo "=== Smoke tests PASSED ==="
              cat app.log
              exit 0
            elif grep -q "NID_RN_SDK_FAIL" app.log; then
              echo "=== Smoke tests FAILED ==="
              cat app.log
              exit 1
            fi
            echo "Waiting for test results... ($i/30)"
            sleep 5
          done

          echo "=== Test timeout - dumping available logs ==="
          cat app.log || echo "No logs available"
          exit 1

  ios:
    name: iOS (RN ${{ matrix.RN_VERSION }})
    runs-on: ${{ matrix.macos }}
    env:
      SIMULATOR_NAME: 'iPhone 17 Pro'
      XCODE: '26.4'
      TOOLCHAINS: 'com.apple.dt.toolchain.XcodeDefault' # Workaround for Xcode 26+: https://github.com/actions/runner-images/issues/13135
    strategy:
      fail-fast: false
      matrix:
        include:
          - RN_VERSION: 'latest'
            macos: 'macos-26'

          # - RN_VERSION: '0.81-stable'
          #   macos: 'macos-26-xlarge'

          - RN_VERSION: '0.79-stable'
            macos: 'macos-26-xlarge'

          # - RN_VERSION: '0.76-stable'
          #   macos: 'macos-26-xlarge'

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Define App Paths
        run: |
          SAFE_MINOR="$(echo "${{ matrix.RN_VERSION}}" | tr '.-' '_')"
          APP_NAME="SmokeApp_$SAFE_MINOR"
          APP_DIR="${{ env.APPS_PATH }}/${APP_NAME}"

          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV

      - name: Create React Native App
        run: |
          mkdir -p "${{ env.APPS_PATH }}"
          rm -rf "${{ env.APP_DIR }}"
          cd "${{ env.APPS_PATH }}"

          npx @react-native-community/cli@latest init "${{ env.APP_NAME }}" \
            --version "${{ matrix.RN_VERSION }}" \
            --skip-install

      - name: Select Xcode Version
        run: |
          ls /Applications/ | grep Xcode
          sudo xcode-select -s /Applications/Xcode_${{ env.XCODE }}.app

      - name: Install JS Dependencies
        working-directory: ${{ env.APP_DIR }}
        run: yarn install

      - name: Install NeuroID SDK
        working-directory: ${{ env.APP_DIR }}
        run: yarn add "file:${{ env.SDK_PATH }}"

      - name: Update Podfile with NeuroID iOS SDK
        working-directory: ${{ env.APP_DIR }}/ios
        run: |
          sed -i '' "/target '${{ env.APP_NAME }}' do/a\\
            pod 'NeuroID', :git => 'https://github.com/Neuro-ID/neuroid-ios-sdk.git', :branch => 'main'
          " Podfile

      # https://github.com/facebook/react-native/issues/55601
      - name: Update fmt package for Xcode 26.4+ support
        working-directory: ${{ env.APP_DIR }}/ios
        if: ${{ matrix.RN_VERSION == '0.76-stable' || matrix.RN_VERSION == '0.81-stable' }}
        run: |
          if [ -f "Podfile" ]; then
            printf '%s\n' \
            "fmt_podspec_path = File.join(__dir__, '..', 'node_modules', 'react-native', 'third-party-podspecs', 'fmt.podspec')" \
            "folly_podspec_path = File.join(__dir__, '..', 'node_modules', 'react-native', 'third-party-podspecs', 'RCT-Folly.podspec')" \
            "" \
            "if File.exist?(fmt_podspec_path)" \
            "  fmt_content = File.read(fmt_podspec_path)" \
            "  fmt_content.gsub!(\"\\\"11.0.2\\\"\", \"\\\"12.1.0\\\"\")" \
            "  File.write(fmt_podspec_path, fmt_content)" \
            "end" \
            "" \
            "if File.exist?(folly_podspec_path)" \
            "  folly_content = File.read(folly_podspec_path)" \
            "  folly_content.gsub!('spec.dependency \"fmt\", \"11.0.2\"', 'spec.dependency \"fmt\", \"12.1.0\"')" \
            "  File.write(folly_podspec_path, folly_content)" \
            "end" >> Podfile
          fi

      - name: Install iOS Dependencies
        working-directory: ${{ env.APP_DIR }}/ios
        run: pod install --repo-update

      - name: Copy Smoke Test Files
        run: |
          cp "${{ github.workspace }}/tests/SmokeRunner.ts" "${{ env.APP_DIR }}/SmokeRunner.ts"
          cp "${{ github.workspace }}/tests/App.tsx" "${{ env.APP_DIR }}/App.tsx"

      - name: Prepare Simulator
        run: |
          xcrun simctl boot "${{ env.SIMULATOR_NAME }}"
          xcrun simctl bootstatus "${{ env.SIMULATOR_NAME }}" -b

      - name: Build and Install iOS App
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -o pipefail

          DERIVED_DATA="$PWD/DerivedData"
          rm -rf "$DERIVED_DATA"

          xcodebuild \
            -workspace ios/${{ env.APP_NAME }}.xcworkspace \
            -scheme ${{ env.APP_NAME }} \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${{ env.SIMULATOR_NAME }}" \
            -derivedDataPath $DERIVED_DATA \
            clean build | xcbeautify

          APP_PATH="$(find "$DERIVED_DATA/Build/Products" -maxdepth 3 -type d -name "${{ env.APP_NAME }}.app" | head -n 1)"
          echo "APP_PATH: $APP_PATH"
          test -d "$APP_PATH" || (echo "Error: No .app produced in DerivedData" && exit 1)

          xcrun simctl install "${{ env.SIMULATOR_NAME }}" "$APP_PATH"

      - name: Launch App and Capture Logs
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -o pipefail

          BUNDLE_ID=$(xcodebuild -showBuildSettings \
            -project ios/${{ env.APP_NAME }}.xcodeproj \
            -scheme ${{ env.APP_NAME }} 2>/dev/null \
            | grep "PRODUCT_BUNDLE_IDENTIFIER" \
            | grep -v "DERIVE" \
            | awk '{print $3}')

          echo "BUNDLE_ID: $BUNDLE_ID"

          if [ -z "$BUNDLE_ID" ]; then
            echo "Error: Could not extract BUNDLE_ID"
            exit 1
          fi

          echo "Starting log stream and launching app..."
          xcrun simctl spawn "${{ env.SIMULATOR_NAME }}" log stream \
            --style compact \
            --level debug \
            --predicate 'subsystem == "com.facebook.react.log" AND category == "javascript"' > app.log 2>&1 &

          xcrun simctl launch "${{ env.SIMULATOR_NAME }}" "$BUNDLE_ID"

      - name: Verify Smoke Test Results
        working-directory: ${{ env.APP_DIR }}
        run: |
          for i in {1..30}; do
            if grep -q "NID_RN_SDK_PASS" app.log; then
              echo "=== Smoke tests PASSED ==="
              cat app.log
              exit 0
            elif grep -q "NID_RN_SDK_FAIL" app.log; then
              echo "=== Smoke tests FAILED ==="
              cat app.log
              exit 1
            fi
            echo "Waiting for test results... ($i/30)"
            sleep 5
          done

          echo "=== Test timeout - dumping available logs ==="
          cat app.log || echo "No logs available"
          exit 1
