# ******************************************************************
# Merge "releases/**" PR to kick off the release to NPM registry.
# ******************************************************************

name: Release React Native SDK

on:
  pull_request_target:
    types:
      - closed
    branches:
      - main

env:
  ACTION_URL: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'

jobs:
  createRelease:
    if: github.event.pull_request.merged && startsWith(github.head_ref, 'releases/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: yarn install --frozen-lockfile

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Retrieve package version
        run: |
          TAG=$(node -p "require('./package.json').version")
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.TAG }}" \
            --latest \
            --title "${{ env.TAG }}" \
            --notes 'The NeuroID React Native SDK (${{ env.TAG }}) is now available.' \
            --generate-notes

      - name: Update new commit to have "Latest" Tag
        run: |
          git config --global user.email developer@neuro-id.com
          git config --global user.name neuroid-developer
          set +e
          git push origin :latest
          git tag -d latest
          git tag latest
          git push origin latest
          set -e

      - name: Send Release Succeeded Result to NID Mobile Infra Repo
        if: success()
        run: |
          curl \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GPR_API_KEY }}" \
            https://api.github.com/repos/Neuro-ID/neuroid-mobile-infra/dispatches \
            -d '{"event_type":"release","client_payload":{"status":"success", "service": "reactnative", "version": "${{ env.TAG }}", "action_url": "${{ env.ACTION_URL }}"}}'

      - name: Send Release Failure Result to NID Mobile Infra Repo
        if: failure()
        run: |
          curl \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GPR_API_KEY }}" \
            https://api.github.com/repos/Neuro-ID/neuroid-mobile-infra/dispatches \
            -d '{"event_type":"release","client_payload":{"status":"failure", "service": "reactnative", "version": "${{ env.TAG }}", "action_url": "${{ env.ACTION_URL }}"}}'

      - name: Upload npm publish logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-publish-logs
          path: /home/runner/.npm/_logs/

  resetAndroidVersion:
    name: Default to main snapshot
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    needs: createRelease
    steps:
      - name: Main branch checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Reset android version to main snapshot
        run: |
          sed -i "s/:react-android-sdk:[0-9a-zA-Z.-]*/:react-android-sdk:main/g" android/build.gradle
          git config --global user.email developer@neuro-id.com
          git config --global user.name neuroid-developer   
          git checkout -b 'post-release-reset'
          git status
          set +e
          git add android/build.gradle
          git commit -m "Reset android version to main"
          git push --set-upstream origin 'post-release-reset'
          set -e

      - name: Create Pull Request
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = "Post-release/Reset android version to main";
            const body = "Merge post release. Resets android version to main";
            const headBranch = 'post-release-reset';
            const baseBranch = 'main';

            const createPullRequest = async () => {
              const response = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                head: headBranch,
                base: baseBranch
              });
              console.log(`Pull request created`);
            };

            createPullRequest();
